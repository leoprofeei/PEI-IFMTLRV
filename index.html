const Alert=({type="info",children})=>{
  const m={info:{bg:"#EBF5FB",b:"#2196F3",i:"💡",c:"#1565C0"},warning:{bg:"#FFF8E1",b:"#F59E0B",i:"⚠️",c:"#92400E"},danger:{bg:"#FEF2F2",b:"#EF4444",i:"🚫",c:"#991B1B"},success:{bg:"#F0FDF4",b:"#22C55E",i:"✅",c:"#166534"},ethics:{bg:"#F5F3FF",b:"#8B5CF6",i:"🤝",c:"#5B21B6"}}[type];
  return <div style={{padding:"13px 16px",borderRadius:9,background:m.bg,borderLeft:`4px solid ${m.b}`,marginBottom:14,fontSize:15,lineHeight:1.7,color:m.c}}><span style={{marginRight:7}}>{m.i}</span>{children}</div>;
};

const Acc=({title,children,open0=false,color=G})=>{
  const [o,sO]=useState(open0);
  return(
    <div style={{marginBottom:10,borderRadius:10,border:`1px solid ${color}30`,overflow:"hidden",background:"white"}}>
      <button onClick={()=>sO(!o)} style={{width:"100%",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",background:o?`${color}0F`:"white",border:"none",cursor:"pointer",fontSize:15,fontWeight:600,color,textAlign:"left",gap:10}}>
        <span>{title}</span>{o?<IcoUp/>:<IcoDown/>}
      </button>
      {o&&<div style={{padding:"4px 16px 16px",fontSize:14.5,lineHeight:1.75,color:"#222"}}>{children}</div>}
    </div>
  );
};

const Card=({title,children,onClick,active,idx=0})=>{
  const tones=["#1B6B45","#24885A","#1A7A50","#155C3A","#20A066","#197348"];
  const bg=tones[idx%tones.length];
  return(
    <div onClick={onClick} style={{borderRadius:12,overflow:"hidden",cursor:"pointer",position:"relative",background:bg,boxShadow:active?"0 6px 24px rgba(27,107,69,0.5)":"0 2px 8px rgba(0,0,0,0.12)",transition:"all 0.2s",transform:active?"translateY(-3px)":"none",border:active?"2px solid rgba(255,255,255,0.3)":"2px solid transparent"}}>
      <div style={{position:"absolute",top:12,right:12,width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,0.95)",display:"flex",alignItems:"center",justifyContent:"center",color:bg}}><IcoPlus/></div>
      <div style={{padding:"18px 16px 14px",color:"white"}}><h4 style={{margin:0,fontSize:15,fontWeight:700,lineHeight:1.3,paddingRight:36}}>{title}</h4></div>
      {active&&<div style={{padding:"0 16px 16px",color:"rgba(255,255,255,0.92)",fontSize:13.5,lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:10}}>{children}</div>}
    </div>
  );
};

      <a href="https://www.in.gov.br/web/dou/-/portaria-mec-n-421-de-15-de-maio-de-2026-706292988" target="_blank" style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 13px",borderRadius:8,background:"#E65100",color:"white",fontSize:12.5,fontWeight:700,textDecoration:"none"}}>Acessar no Diário Oficial →</a>
    </div>
    <h3 style={{fontSize:20,fontWeight:700,color:"#0D2B1A",margin:"0 0 10px"}}>📚 Cadernos Pedagógicos MEC — PNEEI</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:13,marginBottom:26}}>
      {CADERNOS.map((c,i)=>(
        <div key={i} style={{borderRadius:12,background:"white",border:`1.5px solid ${G}30`,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 14px 0"}}><span style={{fontSize:11,fontWeight:700,color:G,background:"#F0FDF4",padding:"2px 8px",borderRadius:4}}>{c.v}</span></div>
          <div style={{padding:"8px 14px 12px",flex:1}}><h4 style={{margin:"6px 0 10px",fontSize:13.5,fontWeight:700,color:"#0D2B1A",lineHeight:1.3}}>{c.t}</h4></div>
          <div style={{padding:"0 14px 12px"}}><a href={c.u} target="_blank" style={{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,background:G,color:"white",fontSize:12,fontWeight:700,textDecoration:"none"}}>Baixar PDF →</a></div>
        </div>
      ))}
    </div>
    <h3 style={{fontSize:20,fontWeight:700,color:"#0D2B1A",margin:"0 0 10px"}}>⚖️ Legislação Federal</h3>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {NORMAS.map((l,i)=>(
        <div key={i} style={{padding:"11px 14px",borderRadius:10,background:"white",border:"1px solid #e0e0e0",display:"flex",alignItems:"flex-start",gap:11,borderLeft:`4px solid ${G}`}}>
          <div style={{flex:1}}>
            <strong style={{fontSize:13,color:"#0D2B1A",display:"block",marginBottom:2}}>{l.ref}</strong>
            <p style={{margin:0,fontSize:12,lineHeight:1.6,color:"#666"}}>{l.desc}</p>
          </div>
          {l.url&&l.url!=="&num;"&&l.url!=="#"&&<a href={l.url} target="_blank" style={{flexShrink:0,padding:"5px 10px",borderRadius:7,background:G,color:"white",fontSize:11.5,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>Acessar →</a>}
        </div>
      ))}
    </div>
  </div>
);

const PgSintese=()=>(
  <div>
    <h2 style={{fontSize:28,fontWeight:700,color:"#0D2B1A",marginBottom:12}}>Síntese Prática</h2>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:13,marginBottom:20}}>
      {[{t:"👀 O que Observar",c:"#0D3B6E",bg:"#EFF6FF",b:"#BFDBFE",i:["Mudanças no comportamento ou rendimento","Dificuldade persistente que destoa do padrão","Sinais de sobrecarga sensorial ou emocional","Discrepância entre capacidade oral e escrita","Desempenho flutuante sem causa aparente"]},{t:"📋 Como Planejar",c:G,bg:"#F0FDF4",b:"#BBF7D0",i:["Consulte o Relatório de Acolhimento antes de elaborar","Defina objetivos específicos a partir do currículo","Diversifique métodos e recursos didáticos","Preveja múltiplas formas de avaliação","Converse com a CAES e a equipe pedagógica"]},{t:"📝 Como Registrar",c:"#5B21B6",bg:"#F5F3FF",b:"#DDD6FE",i:["Preencha o PEI (Anexo II) para seu componente","Elabore o Relatório Bimestral (Anexo III)","Descreva fatos observáveis, não julgamentos","Registre adaptações implementadas e resultados","Entregue documentação para arquivamento"]},{t:"🤝 Quem Acompanha",c:"#B45309",bg:"#FFFBEB",b:"#FDE68A",i:["Docente: elabora e executa o PEI","Coordenação de Curso: orienta e acompanha","Diretoria de Ensino: supervisiona","CAES: acolhe, encaminha e dá suporte","Estudante: protagonista do processo"]}].map((q,i)=>(
        <div key={i} style={{padding:16,borderRadius:12,background:q.bg,border:`1.5px solid ${q.b}`}}>
          <h4 style={{margin:"0 0 10px",fontSize:14,color:q.c,fontWeight:700}}>{q.t}</h4>
          {q.i.map((x,ii)=><div key={ii} style={{display:"flex",gap:6,marginBottom:5,fontSize:13,lineHeight:1.5,color:"#333"}}><span style={{color:q.c,fontWeight:700}}>›</span>{x}</div>)}
        </div>
      ))}
    </div>
    <div style={{padding:20,borderRadius:14,background:`linear-gradient(135deg,${G}10,${G}05)`,border:`1.5px solid ${G}40`,textAlign:"center"}}>
      <p style={{margin:0,fontSize:14,lineHeight:1.8,color:"#0D2B1A",fontStyle:"italic"}}>"Incluir não é apenas garantir a matrícula. É garantir que cada estudante tenha condições reais de aprender, participar e se desenvolver plenamente."</p>
      <p style={{margin:"8px 0 0",fontSize:11,color:"#666"}}>IN Conjunta 2/2023 · IFMT Campus Lucas do Rio Verde · Diretoria de Ensino · Educação Especial Inclusiva</p>
    </div>
  </div>
);

const PAGES={visao:<PgVisao/>,legislacao:<PgLegislacao/>,fluxo:<PgFluxo/>,necessidades:<PgNecessidades/>,estrategias:<PgEstrategias/>,elaboracao:<PgElaboracao/>,registros:<PgRegistros/>,alertas:<PgAlertas/>,recursos:<PgRecursos/>,sintese:<PgSintese/>};

/* ── App ── */
function App(){
  const [tab,sTab]=useState("visao");
  const [drawer,sDrawer]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=0;},[tab]);

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#F4F6F4",minHeight:"100vh",display:"flex",flexDirection:"column"}}>

      {/* Barra azul */}
      <div style={{background:"#0D1B2A",padding:"0 31px",display:"flex",alignItems:"center",justifyContent:"space-between",height:118,position:"sticky",top:0,zIndex:200,boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:26}}>
          <button onClick={()=>sDrawer(true)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",color:"white",padding:"13px 18px",borderRadius:6}}>
            <IcoMenu/>
            <span style={{fontSize:22,fontWeight:700,letterSpacing:3}}>MENU</span>
          </button>
          <div style={{width:1,height:65,background:"rgba(255,255,255,0.2)"}}/>
          <Logo h={80}/>
        </div>
        <span style={{color:"rgba(255,255,255,0.85)",fontSize:22,fontWeight:500}}>
          Campus Lucas do Rio Verde · Diretoria de Ensino · Educação Especial Inclusiva
        </span>
      </div>

      {/* Drawer */}
      {drawer&&(
        <div style={{position:"fixed",inset:0,zIndex:300,display:"flex"}}>
          <div className="slide" style={{width:320,background:"#0D1B2A",padding:"16px 12px",display:"flex",flexDirection:"column",gap:6,overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,padding:"0 4px"}}>
              <Logo h={44}/>
              <button onClick={()=>sDrawer(false)} style={{background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",color:"white",borderRadius:7,padding:"6px 8px",display:"flex",alignItems:"center"}}><IcoX/></button>
            </div>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>{sTab(t.id);sDrawer(false);}}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"11px 14px",border:"none",borderRadius:8,background:tab===t.id?G:"rgba(255,255,255,0.05)",cursor:"pointer",fontSize:14,color:"white",fontWeight:tab===t.id?700:400,textAlign:"left",transition:"all 0.15s"}}>
                {t.label}
                <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.5)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcoPlus/></div>
              </button>
            ))}
          </div>
          <div onClick={()=>sDrawer(false)} style={{flex:1,background:"rgba(0,0,0,0.5)",cursor:"pointer"}}/>
        </div>
      )}

      {/* Breadcrumb */}
      <div style={{background:G,padding:"9px 24px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        {["IFMT","Campus Lucas do Rio Verde","Diretoria de Ensino","Educação Especial Inclusiva"].map((item,i,arr)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:15.6,color:i===arr.length-1?"#A7F3D0":"rgba(255,255,255,0.7)",fontWeight:i===arr.length-1?600:400}}>{item}</span>
            {i<arr.length-1&&<span style={{color:"rgba(255,255,255,0.4)",fontSize:15.6}}>›</span>}
          </div>
        ))}
      </div>

      {/* Título */}
      <div style={{background:"linear-gradient(135deg,#0D2B1A,#1B6B45)",padding:"18px 24px",color:"white"}}>
        <h1 style={{margin:"0 0 4px",fontSize:"clamp(22px,3.5vw,31px)",fontWeight:800,letterSpacing:-0.3}}>Plano Educacional Individualizado</h1>
        <p style={{margin:0,fontSize:16.25,opacity:0.75}}>Guia completo para educadores · IN Conjunta 2/2023 (RTR-DSAE/RTR/IFMT)</p>
      </div>

      {/* Tabs */}
      <div className="tabs-bar">
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>sTab(t.id)} style={{display:"flex",alignItems:"center",padding:"13px 18px",border:"none",background:"transparent",cursor:"pointer",fontSize:16.25,color:tab===t.id?G:"#666",fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",borderBottom:tab===t.id?`3px solid ${G}`:"3px solid transparent",transition:"all 0.15s"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Conteúdo */}
      <main ref={ref} style={{flex:1,padding:"22px 24px 48px",maxWidth:980,width:"100%",margin:"0 auto"}}>
        <div className="fade" key={tab}>{PAGES[tab]||<PgVisao/>}</div>
      </main>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
